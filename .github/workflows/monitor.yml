name: Website Monitor

# THIS BLOCK IS CRITICAL FOR FIXING THE ERROR
permissions:
  contents: write

on:
  schedule:
    # Runs every hour at minute 0. 
    - cron: '0 * * * *'
  
  # Allows manual testing
  workflow_dispatch:

jobs:
  check-website:
    runs-on: ubuntu-latest

    steps:
    # 1. Download your code from the repo
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2. Install Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # 3. Install libraries needed for the script
    - name: Install Dependencies
      run: |
        pip install requests beautifulsoup4

    # 4. Run your script
    - name: Run Monitor Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python monitor.py

    # 5. Save the new "baseline" hash back to the repo
    - name: Commit Updated Baseline
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add baseline_hash.txt
        # Only commit if there are changes to avoid empty commits
        git diff --staged --quiet || git commit -m "Update baseline hash [skip ci]"
        git push
