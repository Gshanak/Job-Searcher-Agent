<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇮🇳 Indian Govt Jobs Dashboard</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--accent:#059669;--border:#334155;--success:#10b981;--warning:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;line-height:1.5}
.container{max-width:900px;margin:0 auto;padding:20px}
.header{background:var(--accent);padding:16px 20px;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:1.1rem;font-weight:600}
.header small{opacity:0.9}
.filters{background:var(--card);padding:16px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.filters select,.filters input{padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.9rem}
.filters button{padding:10px 16px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.9rem}
.filters button:hover{opacity:0.9}
.stats{padding:12px 16px;background:#0f172a;border-bottom:1px solid var(--border);display:flex;gap:16px;font-size:0.85rem;color:#94a3b8}
.job-list{padding:16px;display:flex;flex-direction:column;gap:12px;max-height:65vh;overflow-y:auto}
.job-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}
.job-info h3{font-size:0.95rem;color:#38bdf8;margin-bottom:4px;line-height:1.4}
.job-info .meta{font-size:0.8rem;color:#94a3b8;display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.job-info .meta span{background:#334155;padding:2px 8px;border-radius:4px}
.job-info .meta .source{background:var(--accent)}
.job-info .meta .state{background:var(--warning);color:#0f172a}
.job-info p{font-size:0.85rem;color:#cbd5e1;line-height:1.4}
.job-actions{display:flex;flex-direction:column;gap:6px;min-width:100px}
.btn{padding:6px 10px;border-radius:6px;border:none;cursor:pointer;font-size:0.8rem;text-decoration:none;text-align:center;font-weight:500}
.btn-view{background:#334155;color:white}
.btn-wa{background:#25D366;color:white}
.btn-tg{background:#0088cc;color:white}
.btn-save{background:#475569;color:white}
.btn:hover{opacity:0.9}
.loading{text-align:center;padding:30px;color:#94a3b8}
.empty{text-align:center;padding:30px;color:#94a3b8}
.footer{padding:12px 16px;text-align:center;font-size:0.8rem;color:#64748b;border-top:1px solid var(--border);background:var(--card)}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:0.75rem;font-weight:500}
.badge-official{background:#10b981;color:white}
.badge-aggregator{background:#f59e0b;color:#0f172a}
@media(max-width:600px){.job-card{grid-template-columns:1fr}.job-actions{flex-direction:row;flex-wrap:wrap}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>🇮🇳 Indian Govt Jobs Dashboard</h1>
      <small>70+ Official Sources • Updated Live</small>
    </div>
    <button class="btn btn-save" onclick="showSources()">📋 Sources</button>
  </div>
  
  <div class="filters">
    <input type="text" id="search" placeholder="🔍 Search jobs...">
    <select id="state">
      <option value="All">All States</option>
      <option value="Andhra Pradesh">Andhra Pradesh</option>
      <option value="Bihar">Bihar</option>
      <option value="Delhi">Delhi</option>
      <option value="Gujarat">Gujarat</option>
      <option value="Karnataka">Karnataka</option>
      <option value="Kerala">Kerala</option>
      <option value="Madhya Pradesh">Madhya Pradesh</option>
      <option value="Maharashtra">Maharashtra</option>
      <option value="Punjab">Punjab</option>
      <option value="Rajasthan">Rajasthan</option>
      <option value="Tamil Nadu">Tamil Nadu</option>
      <option value="Telangana">Telangana</option>
      <option value="Uttar Pradesh">Uttar Pradesh</option>
      <option value="West Bengal">West Bengal</option>
    </select>
    <select id="category">
      <option value="All">All Categories</option>
      <option value="Banking">Banking</option>
      <option value="Railway">Railway</option>
      <option value="Defense">Defense</option>
      <option value="Civil Services">Civil Services</option>
      <option value="Police">Police</option>
      <option value="Teaching">Teaching</option>
      <option value="Engineering">Engineering</option>
      <option value="Health">Health</option>
      <option value="Agriculture">Agriculture</option>
      <option value="PSU">PSU</option>
      <option value="PSC">State PSC</option>
      <option value="General">General</option>
    </select>
    <select id="sourceType">
      <option value="All">All Sources</option>
      <option value="official">Official Sites Only</option>
      <option value="aggregator">Aggregators Only</option>
    </select>
    <button id="loadBtn" onclick="fetchJobs()">🔍 Load Jobs</button>
  </div>
  
  <div class="stats" id="stats">
    <span>💡 Click "Load Jobs" to fetch latest notifications</span>
  </div>
  
  <div id="jobList" class="job-list">
    <div class="loading">Ready to search 70+ government job sources...</div>
  </div>
  
  <div class="footer">
    <span>Sources: UPSC, SSC, Railways, Banks, PSCs & more • Data scraped live • No AI • 100% Free</span>
  </div>
</div>

<script>
// 🔑 REPLACE WITH YOUR HF SPACE URL
const API_BASE = "https://YOUR-USERNAME-india-jobs-scraper-api.hf.space";
const BOOKMARKS_KEY = "govt_jobs_bookmarks_v2";

const jobList = document.getElementById("jobList");
const stats = document.getElementById("stats");
const loadBtn = document.getElementById("loadBtn");

function renderJobs(jobs) {
  jobList.innerHTML = "";
  
  if(jobs.length === 0) {
    jobList.innerHTML = '<div class="empty">❌ No jobs found. Try different filters.</div>';
    return;
  }
  
  jobs.forEach(job => {
    const card = document.createElement("div");
    card.className = "job-card";
    card.innerHTML = `
      <div class="job-info">
        <h3>${escapeHtml(job.title)}</h3>
        <div class="meta">
          <span class="source">${escapeHtml(job.source)}</span>
          <span class="badge badge-${job.source_type}">${job.source_type}</span>
          <span>${job.category}</span>
          ${job.state !== "All India" ? `<span class="state">📍 ${job.state}</span>` : ''}
        </div>
        <p>${escapeHtml(job.link.replace(/https?:\/\//,'').split('/')[0])}</p>
      </div>
      <div class="job-actions">
        <a href="${job.link}" target="_blank" class="btn btn-view">View</a>
        <button class="btn btn-wa" onclick="shareWA('${escapeJs(job.title)}', '${escapeJs(job.link)}')">WhatsApp</button>
        <button class="btn btn-tg" onclick="shareTG('${escapeJs(job.title)}', '${escapeJs(job.link)}')">Telegram</button>
        <button class="btn btn-save" onclick="saveBookmark('${escapeJs(job.title)}', '${escapeJs(job.link)}', '${escapeJs(job.source)}')">🔖 Save</button>
      </div>
    `;
    jobList.appendChild(card);
  });
}

function updateStats(data) {
  stats.innerHTML = `
    <span>✅ ${data.jobs.length} jobs found</span>
    <span>🌐 ${data.sources_searched} sources searched</span>
    <span>🕐 ${new Date(data.timestamp).toLocaleTimeString()}</span>
  `;
}

async function fetchJobs() {
  loadBtn.disabled = true;
  loadBtn.textContent = "⏳ Scraping...";
  jobList.innerHTML = '<div class="loading">🔍 Visiting official portals & aggregators...</div>';
  
  const params = new URLSearchParams({
    state: document.getElementById("state").value,
    category: document.getElementById("category").value,
    source_type: document.getElementById("sourceType").value,
    search: document.getElementById("search").value,
    limit: "50"
  });
  
  try {
    const res = await fetch(`${API_BASE}/jobs?${params}`);
    const data = await res.json();
    
    if(data.jobs) {
      renderJobs(data.jobs);
      updateStats(data);
      // Auto-save to cache
      localStorage.setItem("jobs_cache", JSON.stringify({data, timestamp: Date.now()}));
    } else {
      jobList.innerHTML = `<div class="empty">⚠️ ${data.message || "Error loading jobs"}</div>`;
    }
  } catch(e) {
    jobList.innerHTML = '<div class="empty">⚠️ Backend may be sleeping. Wait 15s and try again.<br><small>Tip: Use UptimeRobot to keep it awake 24/7</small></div>';
  }
  
  loadBtn.disabled = false;
  loadBtn.textContent = "🔍 Load Jobs";
}

// Bookmark System
function saveBookmark(title, link, source) {
  let bookmarks = JSON.parse(localStorage.getItem(BOOKMARKS_KEY) || "[]");
  if(!bookmarks.find(b => b.link === link)) {
    bookmarks.unshift({title, link, source, saved_at: new Date().toISOString()});
    localStorage.setItem(BOOKMARKS_KEY, JSON.stringify(bookmarks.slice(0, 50))); // Keep last 50
    alert(`✅ Saved: ${title}`);
  } else {
    alert("ℹ️ Already bookmarked");
  }
}

function showSources() {
  fetch(`${API_BASE}/sources`)
    .then(r => r.json())
    .then(data => {
      const list = data.sources.map(s => 
        `• ${s.name} (${s.category}) ${s.state !== "All India" ? `• ${s.state}` : ""}`
      ).join("\n");
      alert(`📋 Configured Sources (${data.total}):\n\n${list}`);
    });
}

// Share Functions
function shareWA(title, link) {
  window.open(`https://wa.me/?text=${encodeURIComponent(`📢 ${title}\n🔗 ${link}\n\nVia: India Govt Jobs Dashboard`)}`, "_blank");
}
function shareTG(title, link) {
  window.open(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(`📢 ${title}`)}`, "_blank");
}

// Utilities
function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}
function escapeJs(str) {
  return str.replace(/'/g, "\\'").replace(/\n/g, " ");
}

// Load from cache on start (if < 24h old)
function loadFromCache() {
  const cached = localStorage.getItem("jobs_cache");
  if(cached) {
    const {data, timestamp} = JSON.parse(cached);
    if(Date.now() - timestamp < 24 * 60 * 60 * 1000) {
      renderJobs(data.jobs);
      updateStats(data);
      stats.innerHTML += " • 📦 Loaded from cache";
      return true;
    }
  }
  return false;
}

// Init
if(!loadFromCache()) {
  fetchJobs(); // Auto-fetch on first load
}

// Keyboard shortcut
document.getElementById("search").addEventListener("keypress", e => {
  if(e.key === "Enter") fetchJobs();
});
</script>
</body>
</html>
